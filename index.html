<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Songsterr — drum scores</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #1a1d24;
      --panel-hi: #252932;
      --fg: #e6e6e6;
      --muted: #9aa0a6;
      --accent: #ffb454;
      --hair: #2a2e37;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--fg);
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      padding: 32px 16px;
    }
    .layout { max-width: 720px; margin: 0 auto; }
    h1 { font-size: 24px; font-weight: 600; margin: 0 0 4px 0; letter-spacing: -0.01em; }
    .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 24px; }

    /* ── Renderer chooser ─────────────────────────────────────── */
    .chooser {
      display: flex; gap: 6px; padding: 5px;
      background: var(--panel); border: 1px solid var(--hair);
      border-radius: 12px;
    }
    .chooser button {
      flex: 1; appearance: none; cursor: pointer;
      font: inherit; font-size: 13px; font-weight: 600;
      color: var(--muted); background: transparent;
      border: 0; border-radius: 8px; padding: 10px 8px;
      transition: background .12s, color .12s;
    }
    .chooser button:hover { color: var(--fg); }
    .chooser button.on { background: var(--accent); color: #1a1205; }
    .desc {
      color: var(--muted); font-size: 13px; line-height: 1.45;
      margin: 12px 2px 22px 2px; min-height: 19px;
    }

    /* ── Song list (rendered once; links retarget on choice) ──── */
    ul.songs { list-style: none; margin: 0; padding: 0; }
    ul.songs a {
      display: flex; align-items: baseline; gap: 0;
      padding: 13px 16px; background: var(--panel); color: var(--fg);
      text-decoration: none; border-radius: 8px; margin-bottom: 5px;
      transition: background .1s, transform .05s;
    }
    ul.songs a:hover { background: var(--panel-hi); }
    ul.songs a:active { transform: scale(.997); }
    ul.songs .artist { color: var(--accent); font-weight: 600; }
    ul.songs .dash { color: var(--muted); padding: 0 6px; }
    ul.songs .title { color: var(--fg); }
    ul.songs .go { margin-left: auto; color: var(--muted); font-size: 13px; opacity: .7; }

    .footer { margin-top: 36px; font-size: 12px; color: var(--muted); text-align: center; line-height: 1.6; }
    .footer a { color: var(--muted); }
  </style>
</head>
<body>
  <div class="layout">
    <h1>Drum scores</h1>
    <div class="subtitle">Songs synced to YouTube with real drum samples. Pick how you'd like to read them, then choose a song.</div>

    <div class="chooser" id="chooser" role="tablist" aria-label="Rendering method">
      <button data-r="vexflow"    role="tab">VexFlow</button>
      <button data-r="garageband" role="tab">GarageBand</button>
      <button data-r="lilypond"   role="tab">LilyPond</button>
    </div>
    <div class="desc" id="desc"></div>

    <ul class="songs" id="songs"></ul>

    <div class="footer">
      Engraving: VexFlow &amp; LilyPond · Beat grid inspired by GarageBand · Audio: CC0 drum samples (Virtuosity Drums) via Tone.js.
    </div>
  </div>

<script>
// Each song once. id → VexFlow/GarageBand (?song=id); slug → LilyPond page.
const SONGS = [
  { id: '412647_8', slug: 'ghost-square-hammer',            artist: 'Ghost',          title: 'Square Hammer' },
  { id: '19_8',     slug: 'metallica-enter-sandman',        artist: 'Metallica',      title: 'Enter Sandman' },
  { id: '14_6',     slug: 'nirvana-come-as-you-are',        artist: 'Nirvana',        title: 'Come As You Are' },
  { id: '31_6',     slug: 'nirvana-heart-shaped-box',       artist: 'Nirvana',        title: 'Heart-Shaped Box' },
  { id: '295_5',    slug: 'nirvana-in-bloom',               artist: 'Nirvana',        title: 'In Bloom' },
  { id: '269_5',    slug: 'nirvana-smells-like-teen-spirit',artist: 'Nirvana',        title: 'Smells Like Teen Spirit' },
  { id: '16093_3',  slug: 'pixies-wave-of-mutilation',      artist: 'Pixies',         title: 'Wave Of Mutilation' },
  { id: '97_6',     slug: 'radiohead-creep',                artist: 'Radiohead',      title: 'Creep' },
  { id: '89089_8',  slug: 'survivor-eye-of-the-tiger',      artist: 'Survivor',       title: 'Eye Of The Tiger' },
  { id: '431_5',    slug: 'the-cranberries-zombie',         artist: 'The Cranberries',title: 'Zombie' },
];

// Always show the list ordered by artist, then song title (case-insensitive), so
// the order holds no matter what order songs are added to the array above.
SONGS.sort((a, b) =>
  a.artist.localeCompare(b.artist, undefined, { sensitivity: 'base' }) ||
  a.title.localeCompare(b.title,  undefined, { sensitivity: 'base' }));

const RENDERERS = {
  vexflow: {
    label: 'VexFlow',
    desc: 'Engraved staff notation with a live green cursor that follows the YouTube audio.',
    href: s => `vexflow/player.html?song=${s.id}`,
  },
  garageband: {
    label: 'GarageBand',
    desc: 'A colorful step grid — one row per kit piece — that lights up in time with the music.',
    href: s => `garageband/index.html?song=${s.id}`,
  },
  lilypond: {
    label: 'LilyPond',
    desc: 'Publication-quality engraved sheet music with lyrics (static pages).',
    href: s => `songs/${s.slug}.html`,
  },
};

const KEY = 'drumScores.renderer';
let current = localStorage.getItem(KEY);
if (!RENDERERS[current]) current = 'vexflow';

const songsEl = document.getElementById('songs');
songsEl.innerHTML = SONGS.map(s =>
  `<li><a data-song><span class="artist">${s.artist}</span><span class="dash">—</span><span class="title">${s.title}</span><span class="go">›</span></a></li>`
).join('');
const anchors = [...songsEl.querySelectorAll('a[data-song]')];

function apply(r) {
  current = r;
  localStorage.setItem(KEY, r);
  document.querySelectorAll('#chooser button').forEach(b => b.classList.toggle('on', b.dataset.r === r));
  document.getElementById('desc').textContent = RENDERERS[r].desc;
  anchors.forEach((a, i) => { a.href = RENDERERS[r].href(SONGS[i]); });
}

document.getElementById('chooser').addEventListener('click', e => {
  const btn = e.target.closest('button'); if (btn) apply(btn.dataset.r);
});

apply(current);
</script>
</body>
</html>
