<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Songsterr Player</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #1a1d24;
      --paper: #ffffff;
      --paper-rule: #e6e6e6;
      --paper-ink: #1a1a1a;
      --fg: #e6e6e6;
      --muted: #9aa0a6;
      --accent: #ffb454;
      --accent-dim: #6f5320;
      --warn: #f87171;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--fg);
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      min-height: 100vh;
      padding: 24px 16px;
    }
    .layout {
      max-width: 960px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── Control panel (dark) ─────────────────────────────────────────── */
    .panel {
      background: var(--panel);
      border-radius: 12px;
      padding: 16px 20px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }
    h1 {
      margin: 0 0 4px 0;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    .artist {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 12px;
    }
    .controls {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
    }
    button {
      flex: 1;
      padding: 8px 12px;
      background: #2a2e38;
      color: var(--fg);
      border: 1px solid #3a3f4d;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.1s, border-color 0.1s;
      font-family: inherit;
    }
    button:hover:not(:disabled) {
      background: #353a45;
      border-color: #4a4f5d;
    }
    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    button.primary {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }
    button.primary:hover:not(:disabled) {
      background: #8a6628;
    }
    /* ── Speed (practice tempo) row ───────────────────────────────────── */
    .speed-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      font-family: ui-monospace, "SF Mono", Consolas, monospace;
      font-size: 12px;
    }
    .speed-row .speed-label {
      color: var(--muted);
      flex: 0 0 auto;
    }
    .speed-row .speed-hint {
      color: var(--muted);
      flex: 1 1 auto;
      text-align: right;
      font-size: 11px;
    }
    .speed-row .speed-value {
      color: var(--fg);
      font-variant-numeric: tabular-nums;
      min-width: 56px;
      text-align: center;
    }
    /* Override the global "button { flex: 1 }" — these are fixed-width
       icon-style buttons, not the equal-width play/pause/stop bar. */
    .speed-row button.speed-btn {
      flex: 0 0 32px;
      width: 32px;
      padding: 4px 0;
      font-size: 14px;
      font-weight: 600;
    }
    .status {
      font-family: ui-monospace, "SF Mono", Consolas, monospace;
      font-size: 12px;
      line-height: 1.5;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 4px 24px;
    }
    .status .row {
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid #2a2e38;
      padding: 4px 0;
    }
    .status .label { color: var(--muted); }
    .status .value { color: var(--fg); font-variant-numeric: tabular-nums; }
    .marker { color: var(--accent); font-weight: 500; }
    .progress {
      margin-top: 16px;
      height: 4px;
      background: #2a2e38;
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      width: 0%;
      transition: width 0.05s linear;
    }

    /* ── Mode row (only shown when a YouTube video is attached) ───────── */
    .mix-row {
      display: flex;
      gap: 16px;
      align-items: center;
      font-size: 12px;
      color: var(--muted);
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #2a2e38;
    }
    .mix-row[hidden] { display: none; }
    .mode-radio {
      border: 0;
      margin: 0;
      padding: 0;
      display: flex;
      gap: 16px;
    }
    .mode-radio label {
      display: flex;
      gap: 6px;
      align-items: center;
      cursor: pointer;
    }
    .mode-radio input[type="radio"] {
      accent-color: var(--accent);
      cursor: pointer;
    }
    .mix-row .yt-pick-wrap {
      display: flex;
      gap: 6px;
      align-items: center;
      margin-left: auto;
    }
    .mix-row .yt-pick-wrap[hidden] { display: none; }
    .mix-row select {
      background: #2a2e38;
      color: var(--fg);
      border: 1px solid #3a3f4d;
      border-radius: 4px;
      padding: 4px 6px;
      font-family: ui-monospace, "SF Mono", Consolas, monospace;
      font-size: 12px;
      cursor: pointer;
    }

    /* ── YouTube video panel (200×112 thumbnail, 16:9) ────────────────── */
    .yt-wrap {
      position: relative;
      width: 200px;
      height: 112px;
      margin: 0 auto;
      background: #000;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }
    .yt-wrap[hidden] { display: none; }
    .yt-wrap iframe,
    .yt-wrap #yt {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      /* Clickable on purpose: the student needs to hit YouTube's
         "Skip Ad" button during prerolls. Safe because the drum
         cursor never starts implicitly — only when "Start music" is
         pressed, which reads YT's actual position at click time. */
    }

    /* ── Sheet music panel (light "paper") ────────────────────────────── */
    .sheet {
      background: var(--paper);
      color: var(--paper-ink);
      border-radius: 12px;
      padding: 32px 32px 24px 32px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.5);
      min-height: 240px;
      position: relative;
    }
    .sheet-status {
      color: #777;
      font-size: 14px;
      text-align: center;
      padding: 80px 0;
    }
    .sheet-page {
      width: 100%;
      max-width: 100%;
      overflow: hidden;
    }
    .sheet-page + .sheet-page {
      margin-top: 24px;
      border-top: 1px solid var(--paper-rule);
      padding-top: 24px;
    }
    /* LilyPond SVGs come with their own width/height; let them scale to fit. */
    .sheet-page svg {
      display: block;
      max-width: 100%;
      height: auto;
      margin: 0 auto;
    }

    /* ── Footer / errors ──────────────────────────────────────────────── */
    .footer {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
      text-align: center;
    }
    .error {
      color: var(--warn);
      font-size: 13px;
      text-align: center;
    }
    .error:empty { display: none; }
  </style>
</head>
<body>
  <div class="layout">

    <!-- Controls (dark) -->
    <div class="panel">
      <h1 id="title">Loading…</h1>
      <div class="artist" id="artist">&nbsp;</div>

      <div class="controls">
        <button id="btn-play" class="primary" disabled>▶ Play YT</button>
        <button id="btn-start-music" disabled
                title="Press after any ad ends, when the actual song begins in the video. Cursor + drums will sync to whatever position YouTube is at.">
          🎵 Start sync (after ads)
        </button>
        <button id="btn-pause" disabled>⏸ Pause</button>
        <button id="btn-stop" disabled>⏹ Stop</button>
      </div>

      <div class="speed-row">
        <span class="speed-label">Speed</span>
        <button id="btn-tempo-down" class="speed-btn"
                title="Slower (↓)" aria-label="Decrease tempo">−</button>
        <span class="speed-value" id="tempo-value">100%</span>
        <button id="btn-tempo-up" class="speed-btn"
                title="Faster (↑)" aria-label="Increase tempo">+</button>
        <span class="speed-hint">↑ ↓ keys</span>
      </div>

      <div class="status">
        <div class="row">
          <span class="label">Bar</span>
          <span class="value" id="status-bar">—</span>
        </div>
        <div class="row">
          <span class="label">Section</span>
          <span class="value marker" id="status-marker">—</span>
        </div>
        <div class="row">
          <span class="label">Time signature</span>
          <span class="value" id="status-timesig">—</span>
        </div>
        <div class="row">
          <span class="label">Tempo</span>
          <span class="value" id="status-tempo">—</span>
        </div>
        <div class="row">
          <span class="label">Position</span>
          <span class="value" id="status-position">0:00 / 0:00</span>
        </div>
      </div>

      <div class="progress">
        <div class="progress-fill" id="progress"></div>
      </div>

      <!-- Mode radio + YT video picker. Hidden by default; player.js
           reveals when SCHEDULE.youtube_id is set. The three modes map
           to the three real use cases (see player.js MODE enum):
             play_along    — band plays, you play your kit
             sampled_drums — engine renders the tab (no kit needed)
             compare       — both audible, for verifying the tab
           Picker only appears in YT-needed modes when there are ≥2
           candidates. -->
      <div class="mix-row" id="mode-row" hidden>
        <fieldset class="mode-radio">
          <label>
            <input type="radio" name="mode" value="play_along" id="mode-play-along">
            Play along to band
          </label>
          <label>
            <input type="radio" name="mode" value="sampled_drums" id="mode-sampled-drums">
            Sampled drums
          </label>
          <label>
            <input type="radio" name="mode" value="compare" id="mode-compare">
            Both (compare)
          </label>
        </fieldset>
        <span class="yt-pick-wrap" id="yt-pick-wrap" hidden>
          <span>Video:</span>
          <select id="yt-pick"></select>
        </span>
      </div>
    </div>

    <!-- YouTube embed. Hidden until player.js creates a YT.Player here. -->
    <div class="yt-wrap" id="yt-wrap" hidden>
      <div id="yt"></div>
    </div>

    <!-- Sheet music (light) -->
    <div class="sheet" id="sheet">
      <div class="sheet-status" id="sheet-status">Loading sheet music…</div>
    </div>

    <div class="footer">
      Drum samples from Virtuosity Drums (CC0). Sheet music engraved by LilyPond.
    </div>

    <div class="error" id="error"></div>
  </div>

  <script>
// player.js — fetch the schedule, set up Tone.js synths, drive playback,
// fetch and inline LilyPond-rendered SVG pages, drive the UI.
//
// All audio timing comes from Tone.Transport; all UI state is derived from
// Tone.Transport.seconds in a requestAnimationFrame loop. Scheduling is
// done once, when the user first hits Play (Tone.start() requires a user
// gesture for the AudioContext).
//
// Sheet music: SVG pages are fetched as text and inlined into the DOM so
// (a) they style cleanly under our CSS, and (b) Milestone 6e can attach
// click/highlight behaviour to individual <g class="NoteHead"> elements.

'use strict';

// ── Globals ──────────────────────────────────────────────────────────────────

let SCHEDULE = null;          // the dict returned by /api/score
let PLAYERS = null;           // Tone.Players instance built during init()
let MASTER_VOL = null;        // Tone.Volume between PLAYERS and destination

// Drum master gain in dB by mode. SAMPLED_DRUMS uses -6 dB for headroom
// against 9-voice peaks (kick + snare + hats + crashes can stack). In
// COMPARE the drums fight YouTube's mastered-loud backing, so boost
// them so the student can actually hear what they're meant to play.
// PLAY_ALONG mutes via .mute, so the dB value is moot there.
const DRUM_DB_BY_MODE = {
  play_along:    -6,
  sampled_drums: -6,
  compare:        2,
};
let SAMPLES_LOADED = false;   // true once Tone.Players has fetched every buffer
let SCHEDULED = false;        // have we already pushed events to Transport?
let RAF_ID = null;            // animation frame handle for UI loop
let TEMPO_INDEX = 0;          // hint for sequential tempo lookup during play
let MEASURE_INDEX = 0;        // ditto for measures
let EVENT_INDEX = -1;         // active schedule event for cursor highlighting
                              // (-1 = before any event has fired)
let POS_TO_NODES = null;      // Map<position_string, Element[]>, built once
                              // sheet music is inlined into the DOM

// ── YouTube sync state (Milestone 6g) ────────────────────────────────────────
// When SCHEDULE.youtube_id is set, an embedded YT.Player slaves to the
// Tone.Transport clock. Tone.js is master because its sample-accurate
// AudioContext clock has sub-millisecond precision; YT.getCurrentTime
// quantises to ~250 ms and isn't usable as a master. The slave is kept
// in lockstep by:
//   - calling YT.setPlaybackRate when our tempo factor changes
//   - polling drift every ~500 ms wall and seeking YT back if it strays
let YT_PLAYER = null;         // YT.Player instance (or null when no video)
let YT_READY = false;         // YT IFrame API said onReady fired
let YT_BUFFERING = false;     // skip drift correction while buffering
let LAST_YT_DRIFT_CHECK_WALL = 0;   // wall seconds at last drift check
const YT_DRIFT_CHECK_INTERVAL_SEC = 0.5;
const YT_DRIFT_THRESHOLD_SEC = 0.15;   // tighter would oscillate against
                                        // YT's own ~250 ms quantum

// Static deployment (build_static.py) lives at /songs/<slug>.html and
// reaches samples via ../samples/. Dev server (player.py) serves the page
// at / and samples at /samples/. The mode flag we use everywhere else is
// the presence of window.SONGSTERR_SCHEDULE — reuse it here.
const SAMPLES_BASE = window.SONGSTERR_SCHEDULE ? '../samples/' : '/samples/';

// Tempo (practice-speed) state. The schedule is built in musical seconds —
// independent of any user-controlled factor. The factor is applied at
// scheduling time: each event's wall-clock target is
//   wallNow + (event.musical_t - currentMusicalTime) / factor
// so that already-played time is preserved exactly when the factor changes.
// (Tone.Part's own playbackRate setter rebuilds child startTicks from
// Transport tick 0, treating the part as if it were restarting at the new
// rate; for mid-playback changes this drags the elapsed prefix into the
// new rate too. We schedule via Transport.schedule directly to avoid that.)
//
// The cursor reads MUSICAL_TIME, an integral of (wall-clock dt × current
// factor), so mid-playback factor changes stay coherent with audio.
//
// We do NOT touch Tone.Transport.bpm: it would stretch each sample's
// playback duration too, slowing the drum hit itself instead of just the
// gap between hits. We want SPACING to stretch, not the hits.
let TEMPO_FACTOR = 1.0;       // 0.05 .. 1.0, in 0.05 steps
let MUSICAL_TIME = 0;         // accumulated musical seconds played
let LAST_PERF_TIME = 0;       // last performance.now() sample for the cursor
                              // accumulator. We deliberately do NOT read
                              // Tone.Transport.seconds — on iPad with drums
                              // muted (the YT-attached case), the AudioContext
                              // can suspend for power-saving and Transport.seconds
                              // stops advancing, freezing the cursor. The
                              // cursor doesn't need audio-accurate timing, only
                              // a wall clock × tempo factor.
let IS_PLAYING = false;       // mirrors onPlay/onPause/onStop. Used in place
                              // of Tone.Transport.state for the same reason as
                              // LAST_PERF_TIME above.

const TEMPO_MIN = 0.05;
const TEMPO_MAX = 1.0;
const TEMPO_STEP = 0.05;

// Tempo grids by mode. In YT modes (PLAY_ALONG, COMPARE) the drum cursor
// and YT must share a rate, and YT only supports 0.25/0.5/0.75/1.0 inside
// our slow-down window. Mixing rates (e.g. drums 0.85, YT 0.75) creates
// continuous drift, which forces the drift-correction loop to seekTo()
// every ~500ms — that's the "iframe reloading" Pawel observed at 85%.
// In SAMPLED_DRUMS mode there's no YT to match, so full 5% granularity.
const TEMPO_GRID_FINE = (() => {
  const g = [];
  for (let f = TEMPO_MIN; f <= TEMPO_MAX + 1e-9; f += TEMPO_STEP) {
    g.push(Math.round(f * 100) / 100);
  }
  return g;
})();
const TEMPO_GRID_YT = [0.25, 0.50, 0.75, 1.00];

function activeTempoGrid() {
  return ytNeeded() ? TEMPO_GRID_YT : TEMPO_GRID_FINE;
}

const GRACE_V8_OFFSET_SECONDS = 0.030;  // play v8 acciaccaturas 30ms early

// ── Mode (Milestone 6g+ v48) ─────────────────────────────────────────────────
// Three playback modes that map 1:1 to the three real use cases:
//   PLAY_ALONG    — student at the kit plays along to the band-minus-drums
//                   YT backing track. (Music-school default when YT attached.)
//   SAMPLED_DRUMS — no kit available; engine renders the tab via samples.
//                   YT iframe is not loaded.
//   COMPARE       — both YT and sampled drums audible. Verifies the tab.
// When SCHEDULE.youtube_id is null the radio doesn't render and behaviour is
// effectively SAMPLED_DRUMS.
const MODE = Object.freeze({
  PLAY_ALONG: 'play_along',
  SAMPLED_DRUMS: 'sampled_drums',
  COMPARE: 'compare',
});
let CURRENT_MODE = MODE.SAMPLED_DRUMS;  // set definitively in init()

// Predicates derived from CURRENT_MODE — single source of truth for the
// scattered checks that used to be "if (SCHEDULE.youtube_id)" or per-
// checkbox-checked reads.
function ytNeeded()     { return CURRENT_MODE !== MODE.SAMPLED_DRUMS; }
function drumsAudible() { return CURRENT_MODE !== MODE.PLAY_ALONG; }
function ytAudible()    { return CURRENT_MODE !== MODE.SAMPLED_DRUMS; }

// ── DOM handles ──────────────────────────────────────────────────────────────

const $ = (id) => document.getElementById(id);
const elTitle = $('title');
const elArtist = $('artist');
const elBtnPlay = $('btn-play');
const elBtnStartMusic = $('btn-start-music');
const elBtnPause = $('btn-pause');
const elBtnStop = $('btn-stop');
const elBar = $('status-bar');
const elMarker = $('status-marker');
const elTimeSig = $('status-timesig');
const elTempo = $('status-tempo');
const elPosition = $('status-position');
const elProgress = $('progress');
const elError = $('error');
const elSheet = $('sheet');
const elSheetStatus = $('sheet-status');
const elBtnTempoDown = $('btn-tempo-down');
const elBtnTempoUp = $('btn-tempo-up');
const elTempoValue = $('tempo-value');
const elYtWrap = $('yt-wrap');
const elModeRow = $('mode-row');
const elYtPickWrap = $('yt-pick-wrap');
const elYtPick = $('yt-pick');

// Has the user committed to playback this session? True from the first
// Start sync click until Stop. Pause does NOT unlock — to change picker,
// mode, or speed, the user must hit Stop and re-stage. Keeps the UX
// predictable: settings can only change between sessions, not mid-song.
let SETTINGS_LOCKED = false;

// ── Bootstrap ────────────────────────────────────────────────────────────────

async function init() {
  try {
    if (window.SONGSTERR_SCHEDULE) {
      // Static-deployment mode (build_static.py): the schedule is embedded
      // in the page as a window global. Skip the fetch.
      SCHEDULE = window.SONGSTERR_SCHEDULE;
    } else {
      const resp = await fetch('/api/score');
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      SCHEDULE = await resp.json();
    }
  } catch (err) {
    showError(`Failed to load score: ${err.message}`);
    return;
  }

  elTitle.textContent = SCHEDULE.title || '(untitled)';
  elArtist.textContent = SCHEDULE.artist || '';
  elTimeSig.textContent = formatTimeSig(SCHEDULE.measures[0]?.time_sig);
  elTempo.textContent = formatTempo(SCHEDULE.tempos[0]?.bpm);
  elBar.textContent = `1 / ${SCHEDULE.measures.length}`;
  elPosition.textContent = `0:00 / ${formatTime(SCHEDULE.total_seconds)}`;

  elBtnPlay.addEventListener('click', onPlay);
  elBtnStartMusic.addEventListener('click', onStartMusic);
  elBtnPause.addEventListener('click', onPause);
  elBtnStop.addEventListener('click', onStop);
  elBtnTempoDown.addEventListener('click', onTempoDown);
  elBtnTempoUp.addEventListener('click', onTempoUp);
  window.addEventListener('keydown', onKeyDown);
  updateTempoUi();

  // YouTube sync (M6g+): only show the mode row + YT machinery when the
  // schedule names a video. Initial mode is PLAY_ALONG; the student can
  // switch via the radios. The YT IFrame API loads asynchronously;
  // window.YT may not be defined yet, so initYouTube() registers a
  // callback (or calls directly if it's already loaded).
  if (SCHEDULE.youtube_id) {
    CURRENT_MODE = MODE.PLAY_ALONG;
    elModeRow.hidden = false;
    elYtWrap.hidden = false;
    document.getElementById(`mode-${CURRENT_MODE.replace('_', '-')}`).checked = true;
    for (const r of document.querySelectorAll('input[name="mode"]')) {
      r.addEventListener('change', (ev) => setMode(ev.target.value));
    }
    populateYtPicker();
    initYouTube();
  }
  // else: CURRENT_MODE stays SAMPLED_DRUMS, mode-row stays hidden, the page
  // behaves identically to a pre-6g player (drums only).

  // Kick off sample loading immediately. buildPlayers() returns the Tone.Players
  // instance and arms an onload callback that enables the Play button. The
  // button text reads "Loading drums…" until that fires.
  elBtnPlay.textContent = 'Loading drums…';
  PLAYERS = buildPlayers();

  // Sheet music is not on the audio critical path; load it in parallel and
  // let the user start playing as soon as the schedule and samples are up.
  loadSheetMusic(SCHEDULE.svg_pages || 0);
}

function maybeEnablePlay() {
  // Drums must be loaded IFF they'll be heard. YT must be ready IFF the
  // current mode needs it. Sampled-drums-only mode can start as soon as
  // samples load even though we never created the YT iframe.
  if (!SCHEDULE) return;
  if (drumsAudible() && !SAMPLES_LOADED) return;
  if (ytNeeded() && !YT_READY) return;
  elBtnPlay.disabled = false;
  elBtnPlay.textContent = ytNeeded() ? '▶ Play YT' : '▶ Play';
}

// ── Sheet music ──────────────────────────────────────────────────────────────

async function loadSheetMusic(pageCount) {
  if (pageCount <= 0) {
    elSheetStatus.textContent =
      'Sheet music not available (LilyPond compilation skipped or failed).';
    return;
  }

  // Fetch all pages in parallel — they're independent, and most scores
  // are 1–4 pages so the total payload is small.
  let texts;
  try {
    if (Array.isArray(window.SONGSTERR_SVGS)) {
      // Static-deployment mode (build_static.py): the SVG strings are
      // embedded in the page as a window global. Skip the fetches.
      texts = window.SONGSTERR_SVGS;
    } else {
      const responses = await Promise.all(
        Array.from({ length: pageCount }, (_, i) =>
          fetch(`/svg/${i}`).then(r => {
            if (!r.ok) throw new Error(`page ${i}: HTTP ${r.status}`);
            return r.text();
          })
        )
      );
      texts = responses;
    }
  } catch (err) {
    elSheetStatus.textContent = `Failed to load sheet music: ${err.message}`;
    return;
  }

  // Replace the loading placeholder with the inlined SVG pages.
  elSheet.innerHTML = '';
  for (let i = 0; i < texts.length; i++) {
    const wrapper = document.createElement('div');
    wrapper.className = 'sheet-page';
    wrapper.dataset.pageIndex = String(i);
    // innerHTML on an SVG string is the simplest way to get it into the DOM
    // as proper SVG nodes (rather than escaped text). The browser parses
    // the <svg> root and creates the element tree.
    wrapper.innerHTML = texts[i];
    elSheet.appendChild(wrapper);
  }

  buildPositionIndex();
  injectCursorCss();
}

// ── Playback cursor ──────────────────────────────────────────────────────────

function buildPositionIndex() {
  // The emitter tags each notehead's parent <g> with class="note" (or
  // "grace") and data-pos="<num>/<den>". Index those groups by data-pos
  // so the cursor can flip a CSS class on every notehead at a given
  // position in O(1). Multiple noteheads at one position is normal —
  // chords, v5 flam (grace + main), v8 acciaccatura (grace + main note).
  POS_TO_NODES = new Map();
  const groups = elSheet.querySelectorAll('g[data-pos]');
  for (const g of groups) {
    const pos = g.getAttribute('data-pos');
    if (!POS_TO_NODES.has(pos)) POS_TO_NODES.set(pos, []);
    POS_TO_NODES.get(pos).push(g);
  }
  console.log(
    `Cursor index: ${groups.length} noteheads at ${POS_TO_NODES.size} positions`
  );
}

function injectCursorCss() {
  // LilyPond's SVG noteheads are <path fill="currentColor"/> inside the
  // tagged <g>. Setting `color` on the ancestor cascades into the path
  // via currentColor — DO NOT use `fill`, which would have no effect
  // unless we also overrode the path's own fill attribute.
  const style = document.createElement('style');
  style.id = 'cursor-css';
  style.textContent = `
    .sheet-page g.note.active  { color: #d33; }
    .sheet-page g.grace.active { color: #f80; }
  `;
  document.head.appendChild(style);
}

function findCurrentEventIndex(t) {
  // Latest i such that events[i].seconds <= t, or -1 if t precedes all.
  // Sequential, with backward-walk on rewind/stop. Cheap regardless of
  // direction since playback usually moves forward.
  if (!SCHEDULE || !SCHEDULE.events.length) return -1;
  let i = EVENT_INDEX;
  while (i >= 0 && SCHEDULE.events[i].seconds > t) i--;
  while (i + 1 < SCHEDULE.events.length &&
         SCHEDULE.events[i + 1].seconds <= t) i++;
  return i;
}

function clearCursor() {
  if (!POS_TO_NODES) return;
  for (const nodes of POS_TO_NODES.values()) {
    for (const n of nodes) n.classList.remove('active');
  }
}

function updateCursor(t) {
  if (!POS_TO_NODES) return;  // sheet music not loaded yet
  const newIndex = findCurrentEventIndex(t);
  if (newIndex === EVENT_INDEX) return;  // common case: no DOM work

  const oldPos = EVENT_INDEX >= 0
    ? SCHEDULE.events[EVENT_INDEX].position : null;
  const newPos = newIndex >= 0
    ? SCHEDULE.events[newIndex].position : null;

  // Same-position transitions (v8 acciaccatura grace -> on-beat note,
  // both at the same IR position) advance the index without re-toggling
  // classes — avoids a perceptible blink on shared noteheads.
  if (oldPos === newPos) {
    EVENT_INDEX = newIndex;
    return;
  }

  if (oldPos !== null) {
    const oldNodes = POS_TO_NODES.get(oldPos);
    if (oldNodes) for (const n of oldNodes) n.classList.remove('active');
  }
  if (newPos !== null) {
    const newNodes = POS_TO_NODES.get(newPos);
    if (newNodes) for (const n of newNodes) n.classList.add('active');
    if (EVENT_INDEX < 0 && newIndex >= 0) {
      // First highlight — useful to confirm in devtools that the cursor
      // is actually firing class toggles on the right node count.
      console.log(`[player] cursor first hit at pos=${newPos}, `
        + `nodes=${newNodes ? newNodes.length : 0}`);
    }
  }
  EVENT_INDEX = newIndex;
}

// ── Sample playback (Tone.Players) ───────────────────────────────────────────

function buildPlayers() {
  // Single Tone.Players bank, one buffer per drum voice.
  //
  // We wait on Tone.loaded() rather than passing onload to the constructor:
  // the (urls, onload) form is flaky in Tone.js 14.8.x (onload doesn't
  // reliably fire if any buffer is cached or completes synchronously).
  // Tone.loaded() returns a Promise that resolves when *every* tracked
  // ToneAudioBuffer is decoded — works regardless of cache state.
  MASTER_VOL = new Tone.Volume(DRUM_DB_BY_MODE[CURRENT_MODE] ?? -6)
                  .toDestination();
  // CURRENT_MODE is the source of truth. In PLAY_ALONG mode the band's
  // recording carries the song's audio and the student plays a physical
  // kit, so the sampled drums must be silent. SAMPLED_DRUMS and COMPARE
  // both want drums audible.
  MASTER_VOL.mute = !drumsAudible();
  const masterVol = MASTER_VOL;
  const urls = {
    kick:       `${SAMPLES_BASE}kick.mp3`,
    snare:      `${SAMPLES_BASE}snare.mp3`,
    sidestick:  `${SAMPLES_BASE}sidestick.mp3`,
    tom_high:   `${SAMPLES_BASE}tom_high.mp3`,
    tom_low:    `${SAMPLES_BASE}tom_low.mp3`,
    hat_closed: `${SAMPLES_BASE}hat_closed.mp3`,
    hat_open:   `${SAMPLES_BASE}hat_open.mp3`,
    crash:      `${SAMPLES_BASE}crash.mp3`,
    ride:       `${SAMPLES_BASE}ride.mp3`,
  };
  console.log(`Loading drum samples from ${SAMPLES_BASE}…`);
  const players = new Tone.Players(urls).connect(masterVol);

  // Per-voice trim, in dB. crash sits too hot at unity; kick needs a push
  // to cut through the mix.
  players.player('crash').volume.value = -4;
  players.player('kick').volume.value  = +8;

  Tone.loaded().then(() => {
    console.log('Drum samples loaded.');
    SAMPLES_LOADED = true;
    maybeEnablePlay();
  }).catch(err => {
    showError(`Failed to load drum samples: ${err.message}`);
  });

  return players;
}

function dispatch(midi) {
  // Returns the voice name (key into PLAYERS). Drum samples are not pitched,
  // so unlike the previous synth bank we don't need a 'note' field.
  // 9 voices total; see samples/CREDITS.md for the MIDI→voice mapping.
  switch (midi) {
    case 35: case 36:                     return 'kick';
    case 37:                              return 'sidestick';
    case 38: case 39: case 40:            return 'snare';
    case 41: case 43: case 45: case 47:   return 'tom_low';
    case 48: case 50:                     return 'tom_high';
    case 42: case 44:                     return 'hat_closed';
    case 46: case 92:                     return 'hat_open';
    case 49: case 52: case 55: case 57: case 59:
                                          return 'crash';
    case 51: case 53:                     return 'ride';
    default:                              return 'snare';
  }
}

function playDrum(midi, time) {
  // Each call restarts the named player. Tone.Player is monophonic per
  // instance — rapid retriggers cut the previous hit. That matches the old
  // synth behaviour and is fine for snare/kick/hat; for crash/ride a
  // long-decay overlap would be more authentic (deferred to a future
  // milestone).
  PLAYERS.player(dispatch(midi)).start(time);
}

// ── Scheduling ───────────────────────────────────────────────────────────────

function rebuildAudioSchedule(currentMusicalTime, factor) {
  // Re-push every still-future event (musical_t > currentMusicalTime) onto
  // Transport at its target wall-clock time:
  //
  //   target_wall = wallNow + (event.musical_t - currentMusicalTime) / factor
  //
  // We tried Tone.Part with PART.playbackRate = factor, but the setter
  // calls _rescheduleEvents() which recomputes each child's startTick as
  // child.startOffset / playbackRate from Transport tick 0 — i.e. it
  // assumes the Part is restarting fresh at the new rate. Mid-playback
  // changes therefore drag already-elapsed time into the new rate too,
  // producing a cursor-leads-audio drift equal to the time already played.
  // Here we only reschedule the FUTURE, so the elapsed prefix stays put.
  Tone.Transport.cancel();
  const wallNow = Tone.Transport.seconds;
  for (const ev of SCHEDULE.events) {
    const evT = ev.grace_v8
      ? Math.max(0, ev.seconds - GRACE_V8_OFFSET_SECONDS)
      : ev.seconds;
    if (evT <= currentMusicalTime) continue;
    const targetWall = wallNow + (evT - currentMusicalTime) / factor;
    const midiList = ev.midi;
    Tone.Transport.schedule((audioTime) => {
      for (const m of midiList) playDrum(m, audioTime);
    }, targetWall);
  }
}

function scheduleAll() {
  // First-time scheduling at start of playback. MUSICAL_TIME is 0 (just
  // baselined in onPlay → startUiLoop), so this is equivalent to scheduling
  // every event at its musical time / factor. End-of-playback is detected
  // in updateUi() via MUSICAL_TIME — not via a Transport.schedule callback,
  // because that fires by wall-clock and wouldn't honour the factor.
  rebuildAudioSchedule(0, TEMPO_FACTOR);
  SCHEDULED = true;
}

// ── Controls ─────────────────────────────────────────────────────────────────

async function onPlay() {
  // YT modes: this button starts the YouTube video only. The cursor + drums
  // sit frozen at beat 1 until the user separately presses "Start music"
  // when the actual song begins (after any preroll ad — they can click
  // YouTube's Skip Ad button inside the iframe to fast-forward).
  // The YT IFrame API does not reliably expose ad presence (getDuration
  // and getVideoData both return the MAIN video's metadata during the
  // preroll), so automated detection was deleted in favour of this
  // two-button UX.
  //
  // Sampled drums mode (no YT): nothing to wait for — Play directly starts
  // the cursor + drums.
  if (ytNeeded() && YT_PLAYER && YT_READY) {
    YT_PLAYER.setPlaybackRate(TEMPO_FACTOR);
    YT_PLAYER.playVideo();
    elBtnPlay.disabled = true;
    elBtnStartMusic.disabled = false;
    elBtnPause.disabled = false;
    elBtnStop.disabled = false;
    return;
  }

  await Tone.start();
  if (!SCHEDULED) scheduleAll();
  Tone.Transport.start();
  LAST_PERF_TIME = performance.now() / 1000;
  IS_PLAYING = true;
  startUiLoop();
  elBtnPlay.disabled = true;
  elBtnPause.disabled = false;
  elBtnStop.disabled = false;
}

async function onStartMusic() {
  // Starts (or re-syncs) the cursor + drum playback to the YT video's
  // current position. Calculation: songSeconds = max(0, YT.currentTime -
  // youtube_offset). If the user clicks before the song actually begins,
  // songSeconds clamps to 0 and the cursor sits at beat 1 until they
  // click again. Re-clicking re-syncs to whatever position YT is at now,
  // useful if the cursor drifts.
  await Tone.start();
  const ytOffset = SCHEDULE.youtube_offset || 0;
  let ytNow = 0;
  if (ytNeeded() && YT_PLAYER && YT_READY) {
    try { ytNow = YT_PLAYER.getCurrentTime() || 0; } catch (_) { ytNow = 0; }
  }
  const songSeconds = Math.max(0, ytNow - ytOffset);

  // Rebuild the Tone.Transport schedule from scratch so events at past
  // positions don't pile up if Start music was clicked multiple times.
  Tone.Transport.stop();
  Tone.Transport.cancel();
  SCHEDULED = false;
  scheduleAll();

  // Start transport at the calculated offset — Tone skips events scheduled
  // before this offset, so drums fire from songSeconds onward.
  Tone.Transport.start(undefined, songSeconds);
  MUSICAL_TIME = songSeconds;
  LAST_PERF_TIME = performance.now() / 1000;
  LAST_YT_DRIFT_CHECK_WALL = 0;  // immediate drift check on next UI tick
  IS_PLAYING = true;
  startUiLoop();
  console.log(`[player] cursor started at songSeconds=${songSeconds.toFixed(2)} (YT t=${ytNow.toFixed(2)}, offset=${ytOffset.toFixed(2)})`);
  // First Start sync click commits the session: lock picker, mode, speed.
  // Stays locked through Pause; only Stop unlocks (handled in onStop).
  SETTINGS_LOCKED = true;
  applySettingsLock();
}

function onPause() {
  Tone.Transport.pause();
  IS_PLAYING = false;
  if (ytNeeded() && YT_PLAYER && YT_READY) YT_PLAYER.pauseVideo();
  elBtnPlay.disabled = false;
  elBtnPause.disabled = true;
  // Cursor was already running — resume via Start music if user wants.
  elBtnStartMusic.disabled = !ytNeeded();
}

function onStop({ cueYt = true } = {}) {
  // cueYt=false is used by callers that are about to cue a DIFFERENT
  // video right after (the picker swap), to avoid two cueVideoById
  // calls racing inside the iframe — the second one was dropping and
  // YT stayed on the old video.
  Tone.Transport.stop();
  Tone.Transport.position = 0;
  Tone.Transport.cancel();   // clear every pending callback
  SCHEDULED = false;
  IS_PLAYING = false;
  if (ytNeeded() && YT_PLAYER && YT_READY) {
    YT_PLAYER.pauseVideo();
    if (cueYt) {
      // Re-cue (not seek) so YT sits paused at offset without auto-playing.
      try {
        YT_PLAYER.cueVideoById({
          videoId: SCHEDULE.youtube_id,
          startSeconds: SCHEDULE.youtube_offset || 0,
        });
      } catch (_) { /* harmless */ }
    }
  }
  elBtnPlay.disabled = false;
  elBtnStartMusic.disabled = true;
  elBtnPause.disabled = true;
  elBtnStop.disabled = true;
  // Stop ends the session: picker, mode, and speed become editable again.
  SETTINGS_LOCKED = false;
  applySettingsLock();
  TEMPO_INDEX = 0;
  MEASURE_INDEX = 0;
  EVENT_INDEX = -1;
  MUSICAL_TIME = 0;
  LAST_PERF_TIME = 0;
  clearCursor();
  if (RAF_ID) cancelAnimationFrame(RAF_ID);
  RAF_ID = null;
  updateUi(0);
}

// ── Tempo control ────────────────────────────────────────────────────────────

function applySettingsLock() {
  // Single switch that disables every settings control while music is
  // playing. Picker, mode radio, and speed buttons all flip in lockstep.
  const dis = SETTINGS_LOCKED;
  if (elYtPick) elYtPick.disabled = dis;
  document.querySelectorAll('input[name="mode"]').forEach(r => { r.disabled = dis; });
  // Speed buttons: when unlocked, updateTempoUi computes proper bounds
  // (min/max of active grid). When locked, force both disabled regardless.
  if (dis) {
    if (elBtnTempoDown) elBtnTempoDown.disabled = true;
    if (elBtnTempoUp)   elBtnTempoUp.disabled   = true;
  } else {
    updateTempoUi();
  }
}

function snapToGrid(f, grid) {
  // Pick the grid value closest to f.
  let best = grid[0];
  for (const g of grid) {
    if (Math.abs(g - f) < Math.abs(best - f)) best = g;
  }
  return best;
}

function setTempoFactor(f) {
  // Clamp to [TEMPO_MIN, TEMPO_MAX], then snap to the active mode's grid
  // (5% in sampled-drums, 25% in YT modes — see TEMPO_GRID_* comments).
  // In YT modes this guarantees drums and YT play at the SAME rate, so
  // there's nothing for the drift-correction loop to fight.
  let next = Math.max(TEMPO_MIN, Math.min(TEMPO_MAX, f));
  next = snapToGrid(next, activeTempoGrid());
  if (next === TEMPO_FACTOR) { updateTempoUi(); return; }
  TEMPO_FACTOR = next;
  // If a schedule is live, re-aim every still-future callback at its new
  // wall-clock target. The cursor side needs no patching — its accumulator
  // already references the same TEMPO_FACTOR each frame.
  if (SCHEDULED) rebuildAudioSchedule(MUSICAL_TIME, TEMPO_FACTOR);
  // In YT modes, TEMPO_FACTOR is already a YT-supported rate by
  // construction (snap to TEMPO_GRID_YT). No more ytRateFor() needed.
  if (ytNeeded() && YT_PLAYER && YT_READY) {
    YT_PLAYER.setPlaybackRate(TEMPO_FACTOR);
  }
  updateTempoUi();
}

function onTempoUp() {
  const grid = activeTempoGrid();
  const next = grid.find(g => g > TEMPO_FACTOR + 1e-9);
  if (next !== undefined) setTempoFactor(next);
}
function onTempoDown() {
  const grid = activeTempoGrid();
  let prev = null;
  for (const g of grid) {
    if (g < TEMPO_FACTOR - 1e-9) prev = g;
    else break;
  }
  if (prev !== null) setTempoFactor(prev);
}

function updateTempoUi() {
  if (!elTempoValue) return;  // defensive — DOM should always have it
  elTempoValue.textContent = `${Math.round(TEMPO_FACTOR * 100)}%`;
  // Bounds derive from the active grid (YT modes have 4 stops, sampled
  // mode has 20). Epsilon absorbs float-snap rounding.
  const grid = activeTempoGrid();
  elBtnTempoDown.disabled = TEMPO_FACTOR <= grid[0] + 1e-9;
  elBtnTempoUp.disabled   = TEMPO_FACTOR >= grid[grid.length - 1] - 1e-9;
  // Speed-row hint reflects which grid is active — coarse YT-locked
  // steps vs fine sampled steps.
  const elHint = document.querySelector('.speed-row .speed-hint');
  if (elHint) {
    elHint.textContent = ytNeeded()
      ? '25/50/75/100% (YT rates)'
      : '5% steps  ↑ ↓ keys';
  }
}

function onKeyDown(ev) {
  // Don't intercept while a form field has focus (defensive — there are
  // no inputs in this UI today, but a future search box shouldn't break).
  const tag = ev.target && ev.target.tagName;
  if (tag === 'INPUT' || tag === 'TEXTAREA' || ev.target?.isContentEditable) {
    return;
  }
  // Honour the lock: arrow keys are just keyboard accessors for the +/-
  // buttons; if those are disabled, so should these be.
  if (SETTINGS_LOCKED) return;
  if (ev.key === 'ArrowUp') {
    onTempoUp();
    ev.preventDefault();
  } else if (ev.key === 'ArrowDown') {
    onTempoDown();
    ev.preventDefault();
  }
}

// ── UI loop ──────────────────────────────────────────────────────────────────

function startUiLoop() {
  if (RAF_ID) cancelAnimationFrame(RAF_ID);
  // Baseline the perf-clock accumulator at the current wall time. The next
  // frame's dt will be one frame's worth of milliseconds — small and positive.
  LAST_PERF_TIME = performance.now() / 1000;
  const tick = () => {
    tickAccumulator();
    updateUi(MUSICAL_TIME);
    RAF_ID = requestAnimationFrame(tick);
  };
  RAF_ID = requestAnimationFrame(tick);
}

function tickAccumulator() {
  // MUSICAL_TIME tracks "how far we are into the score in musical seconds",
  // computed as the integral of (wall-clock dt × current rate factor).
  // We integrate per-frame rather than computing musical = wall × factor,
  // because that closed form only works under a constant factor — and
  // changing the factor mid-song is the whole point of this feature.
  const wall = performance.now() / 1000;
  const dWall = wall - LAST_PERF_TIME;
  LAST_PERF_TIME = wall;
  if (IS_PLAYING && dWall > 0) {
    MUSICAL_TIME += dWall * TEMPO_FACTOR;
  }
  maybeCorrectYtDrift(wall);
}

function maybeCorrectYtDrift(wall) {
  // Throttled wall-clock check (default ~500 ms). YT's own getCurrentTime
  // quantises to ~250 ms, so polling faster would just oscillate.
  if (!ytNeeded()) return;
  if (!YT_PLAYER || !YT_READY || YT_BUFFERING) return;
  if (!IS_PLAYING) return;
  if (wall - LAST_YT_DRIFT_CHECK_WALL < YT_DRIFT_CHECK_INTERVAL_SEC) return;
  LAST_YT_DRIFT_CHECK_WALL = wall;
  const expected = (SCHEDULE.youtube_offset || 0) + MUSICAL_TIME;
  let actual;
  try {
    actual = YT_PLAYER.getCurrentTime();
  } catch (_) {
    return;  // iframe not ready / cross-origin throw
  }
  if (typeof actual !== 'number' || !isFinite(actual)) return;
  if (Math.abs(expected - actual) > YT_DRIFT_THRESHOLD_SEC) {
    YT_PLAYER.seekTo(expected, true);
  }
}

function updateUi(t) {
  // End-of-playback detection — replaces v36's Transport.schedule callback
  // at total_seconds + 0.5. That fired on wall-clock; we need musical time
  // so the rate factor is honoured (at 50%, the "song" runs twice as long
  // in wall seconds and the end check needs to wait correspondingly).
  if (IS_PLAYING && t >= SCHEDULE.total_seconds + 0.5) {
    onStop();
    return;
  }

  if (MEASURE_INDEX > 0 &&
      t < SCHEDULE.measures[MEASURE_INDEX].seconds_start) {
    MEASURE_INDEX = 0;
  }
  if (TEMPO_INDEX > 0 && t < SCHEDULE.tempos[TEMPO_INDEX].seconds) {
    TEMPO_INDEX = 0;
  }
  while (MEASURE_INDEX + 1 < SCHEDULE.measures.length &&
         SCHEDULE.measures[MEASURE_INDEX + 1].seconds_start <= t) {
    MEASURE_INDEX++;
  }
  while (TEMPO_INDEX + 1 < SCHEDULE.tempos.length &&
         SCHEDULE.tempos[TEMPO_INDEX + 1].seconds <= t) {
    TEMPO_INDEX++;
  }

  const m = SCHEDULE.measures[MEASURE_INDEX];
  const tc = SCHEDULE.tempos[TEMPO_INDEX];

  elBar.textContent = `${m.index} / ${SCHEDULE.measures.length}`;
  elMarker.textContent = m.marker || '—';
  elTimeSig.textContent = formatTimeSig(m.time_sig);
  elTempo.textContent = formatTempo(tc?.bpm);
  elPosition.textContent =
    `${formatTime(t)} / ${formatTime(SCHEDULE.total_seconds)}`;

  const pct = SCHEDULE.total_seconds > 0
    ? Math.min(100, 100 * t / SCHEDULE.total_seconds)
    : 0;
  elProgress.style.width = `${pct}%`;

  updateCursor(t);
}

// ── YouTube sync (Milestone 6g) ──────────────────────────────────────────────

function initYouTube() {
  // The IFrame API loads asynchronously via the <script> tag in player.html.
  // window.YT may or may not be defined yet when init() runs. Either path
  // ends up calling createYtPlayer(), exactly once.
  if (window.YT && typeof window.YT.Player === 'function') {
    createYtPlayer();
    return;
  }
  // YT's API will call window.onYouTubeIframeAPIReady when ready. If another
  // script set it already, chain. (Defensive — we don't expect that today.)
  const prior = window.onYouTubeIframeAPIReady;
  window.onYouTubeIframeAPIReady = function () {
    if (typeof prior === 'function') {
      try { prior(); } catch (_) { /* swallow */ }
    }
    createYtPlayer();
  };
}

function createYtPlayer() {
  YT_PLAYER = new YT.Player('yt', {
    videoId: SCHEDULE.youtube_id,
    playerVars: {
      playsinline: 1,         // iOS Safari: inline rather than fullscreen takeover
      controls: 0,            // drum tab is the only timeline
      modestbranding: 1,
      rel: 0,
      enablejsapi: 1,
      origin: location.origin,
    },
    events: {
      onReady: onYtReady,
      onStateChange: onYtStateChange,
    },
  });
}

function onYtReady() {
  YT_READY = true;
  // Re-cue the video at the song's start offset so the first frame the user
  // sees is the right one. CRUCIAL: use cueVideoById, NOT seekTo. Per the
  // YT IFrame API spec, seekTo(_, true) on a cued (or any non-paused)
  // player STARTS playback — that bug let the YT video autoplay the moment
  // the page loaded, before the user touched our Play button. cueVideoById
  // sets startSeconds without triggering playback.
  try {
    YT_PLAYER.cueVideoById({
      videoId: SCHEDULE.youtube_id,
      startSeconds: SCHEDULE.youtube_offset || 0,
    });
    // Match initial mode's audibility — PLAY_ALONG and COMPARE want sound,
    // SAMPLED_DRUMS (a mid-session mode switch into a YT mode) wants silent
    // until the user explicitly switches.
    ytAudible() ? YT_PLAYER.unMute() : YT_PLAYER.mute();
  } catch (_) { /* tolerate early-state errors */ }
  maybeEnablePlay();
}

function onYtStateChange(ev) {
  // States: -1 unstarted, 0 ended, 1 playing, 2 paused, 3 buffering, 5 cued.
  if (ev.data === 3) {
    YT_BUFFERING = true;
  } else if (ev.data === 1) {
    YT_BUFFERING = false;
    // After a buffering stall the YT clock may be far from our musical
    // clock — force a resync on the next drift check.
    LAST_YT_DRIFT_CHECK_WALL = 0;
  } else if (ev.data === 0) {
    // YT video reached its end. If drums are still playing they'll keep
    // going until the rAF end-of-playback check fires; trigger Stop now
    // so the UI snaps cleanly back.
    if (IS_PLAYING) onStop();
  }
}

function populateYtPicker() {
  // Mirror Songsterr's own UI labels: "Full mix" + "Backing track" promoted
  // to the top of the dropdown. Selection rules match what Songsterr's web
  // player actually embeds (verified via scratch/har/square_hammer_v2.har):
  //   - Full mix      = first candidate with feature == null
  //                     (fallback: first feature:"alternative")
  //   - Backing track = first candidate with feature:"backing"
  // All remaining candidates appear below an <optgroup> separator so an
  // override like Wave of Mutilation's Fh8zVOpvHDk stays reachable.
  const candidates = SCHEDULE.youtube_candidates || [];
  if (!elYtPick || candidates.length < 1) return;

  // Backing-track rule (matches Songsterr's UI, verified via HARs):
  // each backing video is curated for a specific instrument part — the
  // entry's `tracks` array carries the partIds it's synced to. Pick the
  // entry whose tracks includes SCHEDULE.part_id (drums). Fallback to
  // first feature:backing for caches predating the tracks field.
  const partId   = SCHEDULE.part_id;
  const isBacking = c => c && c.feature === 'backing';
  const matchesPart = c => c && Array.isArray(c.tracks) && c.tracks.includes(partId);

  const backing = candidates.find(c => isBacking(c) && matchesPart(c))
               || candidates.find(isBacking);
  const fullMix = candidates.find(c => c && c.feature === null)
               || candidates.find(c => c && c.feature === 'alternative');

  // Need at least one named slot OR an override target to bother rendering.
  if (!fullMix && !backing && candidates.length < 2) return;

  const currentId = SCHEDULE.youtube_id;
  const slotIds = new Set([fullMix?.video_id, backing?.video_id].filter(Boolean));

  const mkOpt = (cand, label) => {
    const opt = document.createElement('option');
    opt.value = cand.video_id;
    const off = (typeof cand.offset === 'number')
      ? ` @${cand.offset.toFixed(1)}s` : '';
    opt.textContent = `${label}${off}`;
    if (cand.video_id === currentId) opt.selected = true;
    return opt;
  };

  elYtPick.innerHTML = '';
  if (fullMix) elYtPick.appendChild(mkOpt(fullMix, 'Full mix'));
  if (backing) elYtPick.appendChild(mkOpt(backing, 'Backing track'));

  const others = candidates.filter(c => c && !slotIds.has(c.video_id));
  if (others.length) {
    const group = document.createElement('optgroup');
    group.label = '── other candidates ──';
    for (const c of others) {
      group.appendChild(mkOpt(c, `${c.feature || '(none)'} — ${c.video_id}`));
    }
    elYtPick.appendChild(group);
  }

  elYtPickWrap.hidden = false;
  elYtPick.addEventListener('change', onYtPick);
}

async function onYtPick(ev) {
  const newId = ev.target.value;
  if (!newId || newId === SCHEDULE.youtube_id) return;

  // Any swap mid-playback is messy: cleanest UX is to stop everything and
  // let the user hit Play YT → wait for ad → Start music again with the
  // new video. Pass cueYt:false because we cue the NEW video below;
  // letting onStop cue the OLD one too causes a race inside the iframe
  // where the new cue gets dropped and YT keeps showing the old video.
  if (IS_PLAYING || !elBtnStartMusic.disabled) onStop({ cueYt: false });

  // Each video has its own sync offset (Songsterr's /api/video-points
  // points[0]). Update the schedule's offset so the next Play uses the
  // right preroll target for the new video.
  const chosen = (SCHEDULE.youtube_candidates || [])
    .find(c => c.video_id === newId);
  if (chosen && typeof chosen.offset === 'number') {
    SCHEDULE.youtube_offset = chosen.offset;
  }

  if (YT_PLAYER && YT_READY) {
    try {
      YT_PLAYER.cueVideoById({
        videoId: newId,
        startSeconds: SCHEDULE.youtube_offset || 0,
      });
    } catch (_) { /* iframe not ready, harmless */ }
  }

  SCHEDULE.youtube_id = newId;

  // Persist server-side; in static-deploy mode there's no backend, so a
  // 404/CORS failure here is expected. The in-session swap still works.
  try {
    await fetch('/api/youtube-choice', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ video_id: newId }),
    });
  } catch (_) { /* static-site mode, no backend */ }
}

function setMode(newMode) {
  // Mid-playback mode switch: cleanest UX is to stop everything and let the
  // student re-press Play. The drum schedule and YT timeline both restart
  // from scratch in the new mode.
  if (IS_PLAYING) onStop();
  if (newMode === CURRENT_MODE) return;
  CURRENT_MODE = newMode;

  // Drum-output mute + gain both depend on mode. Compare-mode boost
  // (+2 dB) is what lets drums cut through the YT mix without manual
  // volume tweaking.
  if (MASTER_VOL) {
    MASTER_VOL.mute = !drumsAudible();
    MASTER_VOL.volume.value = DRUM_DB_BY_MODE[CURRENT_MODE] ?? -6;
  }

  // YT iframe: if we now need it but it was never created (entered the
  // page as SAMPLED_DRUMS without a youtube_id, then switched into a
  // YT mode — can't happen today since the radio is hidden in that case,
  // but the guard is harmless), create it. Otherwise just mute/unmute.
  if (ytNeeded()) {
    if (!YT_PLAYER) {
      elYtWrap.hidden = false;
      initYouTube();
    } else if (YT_READY) {
      try { ytAudible() ? YT_PLAYER.unMute() : YT_PLAYER.mute(); }
      catch (_) { /* iframe transient state, harmless */ }
    }
  } else if (YT_PLAYER && YT_READY) {
    // Leaving a YT mode: pause + mute + rewind. Don't tear down the iframe;
    // re-creating it costs a network round-trip and re-hits the Referer
    // restriction. Keeping it loaded means the next switch is instant.
    try {
      YT_PLAYER.pauseVideo();
      YT_PLAYER.mute();
      YT_PLAYER.seekTo(SCHEDULE.youtube_offset || 0, true);
    } catch (_) { /* harmless */ }
  }

  // Picker is only meaningful when YT is in play AND there's a real choice.
  if (elYtPickWrap) {
    const candidates = SCHEDULE.youtube_candidates || [];
    elYtPickWrap.hidden = !(ytNeeded() && candidates.length > 1);
  }

  // Mode change can flip the tempo grid (fine 5% ↔ YT-locked 25%). Re-snap
  // current tempo so the displayed value is always on the active grid —
  // e.g. 85% in sampled mode → 75% when switching to Play along.
  setTempoFactor(TEMPO_FACTOR);

  maybeEnablePlay();
}

// ── Formatters ───────────────────────────────────────────────────────────────

function formatTimeSig(ts) {
  if (!ts) return '—';
  return `${ts[0]}/${ts[1]}`;
}

function formatTempo(bpm) {
  if (bpm == null) return '—';
  return `\u2669 = ${Math.round(bpm * 10) / 10}`;
}

function formatTime(s) {
  if (!isFinite(s)) return '0:00';
  const mins = Math.floor(s / 60);
  const secs = Math.floor(s % 60);
  return `${mins}:${secs.toString().padStart(2, '0')}`;
}

function showError(msg) {
  elError.textContent = msg;
  console.error(msg);
}

// ── Go ───────────────────────────────────────────────────────────────────────

init();

</script>
