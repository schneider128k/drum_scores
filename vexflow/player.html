<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Drum score</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #fafafa;
      color: #1a1a1a;
      overflow-x: hidden;
    }
    #topbar {
      position: sticky; top: 0; z-index: 10;
      background: rgba(250,250,250,0.97);
      backdrop-filter: saturate(1.2) blur(6px);
      border-bottom: 1px solid #e2e2e2;
      padding: 8px 3%;
    }
    .bar-row { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
    .bar-row + .bar-row { margin-top: 8px; }
    .titles { display: flex; flex-direction: column; line-height: 1.18; min-width: 0; flex: 1 1 auto; }
    #heading { font-size: 20px; font-weight: 650; letter-spacing: -0.01em; }
    #subheading { font-size: 12px; color: #888; }
    #yt { width: 200px; height: 112px; background: #000; border-radius: 6px; overflow: hidden; flex: 0 0 auto; }
    #yt iframe { border-radius: 6px; }
    #transport {
      min-height: 44px; min-width: 104px; padding: 0 18px;
      font-size: 16px; font-weight: 600;
      border: 1px solid #cfcfcf; border-radius: 10px; background: #fff; color: #1a1a1a; cursor: pointer;
    }
    #transport:disabled { opacity: 0.45; cursor: default; }
    #transport.attention { border-color: #36b35a; color: #1f8f43; box-shadow: 0 0 0 3px rgba(54,179,90,0.15); }
    .speed { display: inline-flex; align-items: center; gap: 6px; }
    .speed button {
      min-height: 44px; min-width: 44px; font-size: 20px; line-height: 1;
      border: 1px solid #cfcfcf; border-radius: 10px; background: #fff; cursor: pointer;
    }
    #rate { min-width: 48px; text-align: center; font-size: 14px; font-variant-numeric: tabular-nums; }
    .speed-label { font-size: 12px; color: #999; }
    #status { font-size: 12px; color: #777; font-variant-numeric: tabular-nums; white-space: nowrap; }
    .util { margin-left: auto; display: inline-flex; align-items: center; gap: 14px; }
    .back { color: #9aa0a6; text-decoration: none; font-size: 13px; white-space: nowrap; }
    .back:hover { color: #0066cc; }
    #hint { font-size: 12px; color: #1f8f43; flex: 1 1 100%; min-height: 14px; margin-top: 2px; }
    #score { width: 94%; margin: 0 auto; padding: 10px 0 60vh; }
    .row { display: block; margin: 0; }
    .row svg { display: block; }
    #errlog { color: #c00; background: #ffe; padding: 8px; margin: 8px 3%; border-radius: 4px; white-space: pre-wrap; display: none; }
  </style>
</head>
<body>
  <div id="topbar">
    <div class="bar-row">
      <div class="titles">
        <span id="heading">Loading…</span>
        <span id="subheading"></span>
      </div>
      <div id="yt"></div>
    </div>
    <div class="bar-row">
      <button id="transport" disabled>▶ Play</button>
      <span class="speed-label">Speed</span>
      <span class="speed">
        <button id="slower" aria-label="Slower">−</button>
        <span id="rate">100%</span>
        <button id="faster" aria-label="Faster">+</button>
      </span>
      <span id="status"></span>
      <span class="util">
        <a class="back" href="../index.html">‹ All songs</a>
      </span>
      <span id="hint"></span>
    </div>
  </div>

  <pre id="errlog"></pre>
  <div id="score"></div>

  <script>
    window.addEventListener('error', e => {
      const log = document.getElementById('errlog');
      log.style.display = 'block';
      log.textContent += '\nERROR: ' + e.message + '\n  at ' + e.filename + ':' + e.lineno + ':' + e.colno;
    });
  </script>

  <!-- Load the score chosen by ?song=<id>_<part>. document.write keeps it
       synchronous so renderer.js sees window.SCORE on first run. -->
  <script>
    (function () {
      const id = (new URLSearchParams(location.search).get('song') || '31_6').replace(/[^0-9_]/g, '');
      document.write('<script src="score_' + id + '.js"><\/script>');
    })();
  </script>

  <script src="vexflow.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
