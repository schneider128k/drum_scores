<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Drum score</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #fafafa;
      color: #1a1a1a;
      overflow-x: hidden;
    }
    /* Score owns the top and the bulk of the screen. Bottom padding lets the
       last rows scroll up into the centred reading zone, and clears the dock. */
    #score { width: 94%; margin: 0 auto; padding: 16px 0 calc(60vh + 120px); }
    .row { display: block; margin: 0; }
    .row svg { display: block; }

    /* Slim set-and-forget control dock, pinned to the bottom edge (thumb reach on
       an iPad). One row of controls, with the hint line collapsing above it. */
    #dock {
      position: fixed; left: 0; right: 0; bottom: 0; z-index: 10;
      display: flex; flex-direction: column; gap: 6px;
      background: rgba(250,250,250,0.97);
      backdrop-filter: saturate(1.2) blur(6px);
      border-top: 1px solid #e2e2e2;
      padding: 8px 3%;
    }
    .dock-row { display: flex; align-items: center; gap: 14px; }
    #yt { width: 160px; height: 90px; background: #000; border-radius: 6px; overflow: hidden; flex: 0 0 auto; }
    #yt iframe { border-radius: 6px; }
    #transport {
      min-height: 44px; min-width: 104px; padding: 0 18px;
      font-size: 16px; font-weight: 600;
      border: 1px solid #cfcfcf; border-radius: 10px; background: #fff; color: #1a1a1a; cursor: pointer;
    }
    #transport:disabled { opacity: 0.45; cursor: default; }
    #transport.attention { border-color: #36b35a; color: #1f8f43; box-shadow: 0 0 0 3px rgba(54,179,90,0.15); }
    .speed { display: inline-flex; align-items: center; gap: 6px; }
    .speed button {
      min-height: 44px; min-width: 44px; font-size: 20px; line-height: 1;
      border: 1px solid #cfcfcf; border-radius: 10px; background: #fff; cursor: pointer;
    }
    #rate { min-width: 48px; text-align: center; font-size: 14px; font-variant-numeric: tabular-nums; }
    #printbtn {
      min-height: 44px; padding: 0 14px; font-size: 14px; font-weight: 600;
      border: 1px solid #cfcfcf; border-radius: 10px; background: #fff; color: #1a1a1a; cursor: pointer; flex: 0 0 auto;
    }
    .meta { display: flex; flex-direction: column; min-width: 0; flex: 1 1 auto; line-height: 1.25; }
    #heading { font-size: 14px; font-weight: 650; letter-spacing: -0.01em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #status { font-size: 12px; color: #777; font-variant-numeric: tabular-nums; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .back { color: #9aa0a6; text-decoration: none; font-size: 13px; white-space: nowrap; flex: 0 0 auto; }
    .back:hover { color: #0066cc; }
    #hint { font-size: 12px; color: #1f8f43; }
    #hint:empty { display: none; }
    #errlog { color: #c00; background: #ffe; padding: 8px; margin: 8px 3%; border-radius: 4px; white-space: pre-wrap; display: none; }

    /* Print header — only appears in the printout (above the first row). */
    #print-header { display: none; }

    /* Print to Letter: drop the dock + cursor, lay rows on paper, keep each row
       whole on a page. The score is re-rendered to the page width on print
       (renderer.js), and the viewBox lets the SVG scale to fit as a fallback. */
    @media print {
      @page { size: letter landscape; margin: 0.5in; }
      html, body { background: #fff; }
      #dock, #errlog { display: none !important; }
      #cursor-bar { display: none !important; }
      #score { width: 100%; margin: 0; padding: 0; }
      .row { break-inside: avoid; page-break-inside: avoid; }
      .row svg { width: 100%; height: auto; }
      #print-header { display: block; margin: 0 0 12px; }
      #print-header .pt { font-size: 18px; font-weight: 700; }
      #print-header .ps { font-size: 12px; color: #555; margin-top: 2px; }
    }
  </style>
</head>
<body>
  <pre id="errlog"></pre>
  <div id="print-header"></div>
  <div id="score"></div>

  <div id="dock">
    <div id="hint"></div>
    <div class="dock-row">
      <button id="transport" disabled>▶ Play</button>
      <span class="speed">
        <button id="slower" aria-label="Slower">−</button>
        <span id="rate">100%</span>
        <button id="faster" aria-label="Faster">+</button>
      </span>
      <span class="meta">
        <span id="heading">Loading…</span>
        <span id="status"></span>
      </span>
      <button id="printbtn">Print</button>
      <a class="back" href="../index.html">‹ All songs</a>
      <div id="yt"></div>
    </div>
  </div>

  <script>
    window.addEventListener('error', e => {
      const log = document.getElementById('errlog');
      log.style.display = 'block';
      log.textContent += '\nERROR: ' + e.message + '\n  at ' + e.filename + ':' + e.lineno + ':' + e.colno;
    });
  </script>

  <!-- Load the score chosen by ?song=<id>_<part>. document.write keeps it
       synchronous so renderer.js sees window.SCORE on first run. -->
  <script>
    (function () {
      const id = (new URLSearchParams(location.search).get('song') || '31_6').replace(/[^0-9_]/g, '');
      document.write('<script src="score_' + id + '.js"><\/script>');
    })();
  </script>

  <script src="vexflow.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
